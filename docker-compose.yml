services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-familytree}
      POSTGRES_USER: ${POSTGRES_USER:-familytree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-familytree}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-familytree} -d ${POSTGRES_DB:-familytree}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-familytree}:${POSTGRES_PASSWORD:-familytree}@postgres:5432/${POSTGRES_DB:-familytree}?sslmode=disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /uploads
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: "8080"
      SITE_ADMIN_EMAIL: ${SITE_ADMIN_EMAIL:-}
    volumes:
      - upload_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/srv
    command: sh -c "cp -r /dist/. /srv/ && tail -f /dev/null"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - frontend_dist:/srv:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  upload_data:
  caddy_data:
  caddy_config:
  frontend_dist: